<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="LamEase - Your premium e-commerce platform for quality products and seamless shopping experience" />
    <meta name="keywords" content="e-commerce, shopping, products, online store" />
    <meta name="author" content="LamEase Team" />
    
    <!-- Open Graph Tags (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LamEase - Premium E-commerce Store" />
    <meta property="og:description" content="Discover quality products with fast shipping and easy checkout" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://lamease.com" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LamEase - Premium E-commerce Store" />
    <meta name="twitter:description" content="Discover quality products with fast shipping and easy checkout" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#ffffff" />
    
    <!-- Preconnect to External Resources (if needed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>LamEase - Premium E-commerce Store</title>
  </head>
  <body>
    <!-- React Root Element -->
    <div id="root"></div>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/main.jsx"></script>
